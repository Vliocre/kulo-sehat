services:
  app:
    image: ${APP_IMAGE:-ghcr.io/vliocre/kulo-sehat:latest}
    container_name: laravel_app
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    env_file:
      - .env
    volumes:
      - ./storage/app/public:/var/www/html/storage/app/public
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-kulosehat}
      MYSQL_USER: ${DB_USERNAME:-kulosehat}
      MYSQL_PASSWORD: ${DB_PASSWORD:-kulosehat_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpasswordharusnyaunik}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${DB_ROOT_PASSWORD} --silent || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
