name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1: TESTING ───────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, bcmath

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHPUnit tests
        run: php artisan test

  # ─── JOB 2: BUILD & PUSH IMAGE ────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    # ─── JOB 3: DEPLOY KE VPS ────────────────────────────────
  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8022

          timeout: 30m
          command_timeout: 60m

          script: |
            set -e

            echo "🚀 Mulai deployment..."

            cd ~/RPL2D-kelompok-7

            echo "🐳 Docker version:"
            docker --version

            echo "🐳 Docker Compose version:"
            docker-compose version

            # Login GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull image terbaru
            echo "📦 Pulling latest images..."
            docker-compose pull

            # Hapus container lama
            echo "🧹 Cleaning old containers..."
            docker-compose down --remove-orphans || true

            docker rm -f kelompok7_app_1 || true
            docker rm -f kelompok7_db_1 || true

            # Start ulang container
            echo "♻️ Starting fresh containers..."
            docker-compose up -d --force-recreate

            # Tunggu database
            echo "⏳ Waiting for database..."

            for i in $(seq 1 30); do
              if docker-compose exec -T db mysqladmin ping -h localhost --silent; then
                echo "✅ Database ready."
                break
              fi

              echo "Still waiting for DB..."
              sleep 2
            done

            # Migration
            echo "📂 Running migrations..."
            docker-compose exec -T app php artisan migrate --force --no-interaction

            # Optimize Laravel
            echo "🧹 Optimizing Laravel..."
            docker-compose exec -T app php artisan config:cache
            docker-compose exec -T app php artisan route:cache
            docker-compose exec -T app php artisan view:cache

            echo "✅ Deployment selesai!"
