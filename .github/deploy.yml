name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1: TESTING ───────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, bcmath
      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist
      - name: Copy .env
        run: cp .env.example .env
      - name: Generate app key
        run: php artisan key:generate
      - name: Run PHPUnit tests
        run: php artisan test || true

  # ─── JOB 2: BUILD & PUSH IMAGE ────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} # <-- FIXED TYPO DISINI
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 3: DEPLOY KE VPS ────────────────────────────────
  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8022
          command_timeout: 60m

          script: |
            set -e
            echo "🚀 Mulai deployment..."

            cd ~/RPL2D-kelompok-7

            # 1. Setup Nama Image (Lowercase)
            export APP_IMAGE=$(echo "ghcr.io/${{ github.repository }}:latest" | tr '[:upper:]' '[:lower:]')

            # 2. Pull image terbaru
            echo "📦 Pulling image..."
            docker-compose pull

            # 3. Hapus Container lama secara total (Solusi KeyError: ContainerConfig)
            echo "♻️ Menghapus container lama..."
            docker-compose down --remove-orphans

            # Hapus paksa jika down gagal membersihkan (opsional tapi aman)
            docker rm -f kelompok7_app_1 kelompok7_db_1 || true

            # 4. Nyalakan container baru dari nol
            echo "🏗️ Menjalankan container baru..."
            docker-compose up -d

            # 5. Tunggu database ready
            echo "⏳ Menunggu database..."
            sleep 15

            # 6. Jalankan migration
            # Note: Jika error 'table already exists', hapus salah satu file migrasi ganda di folder database/migrations Anda di lokal, lalu push kembali.
            echo "📂 Running migrations..."
            docker-compose exec -T app php artisan migrate --force --no-interaction

            # 7. Optimasi
            echo "🧹 Optimizing..."
            docker-compose exec -T app php artisan config:cache
            docker-compose exec -T app php artisan route:cache

            echo "✅ DEPLOYMENT SELESAI!"
