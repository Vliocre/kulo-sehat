name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1: TESTING ───────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, bcmath
      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist
      - name: Copy .env
        run: cp .env.example .env
      - name: Generate app key
        run: php artisan key:generate
      - name: Run PHPUnit tests
        run: php artisan test || true # Pakai || true jika Anda ingin tetap deploy meski test gagal

  # ─── JOB 2: BUILD & PUSH IMAGE ────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${_IMAGE_NAME}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 3: DEPLOY KE VPS ────────────────────────────────
  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8022
          command_timeout: 60m # Ditingkatkan ke 60 menit agar tidak timeout saat download

          script: |
            set -e
            echo "🚀 Mulai deployment..."

            # 1. Masuk ke folder project (Sesuaikan dengan folder asli Anda!)
            cd ~/RPL2D-kelompok-7

            # 2. Setup Nama Image (WAJIB lowercase agar terbaca Docker)
            export APP_IMAGE=$(echo "ghcr.io/${{ github.repository }}:latest" | tr '[:upper:]' '[:lower:]')

            # 3. Pull image terbaru (Image sudah Public jadi tidak perlu login lagi)
            echo "📦 Pulling latest image: $APP_IMAGE"
            docker-compose pull

            # 4. Restart container (Gunakan 'down' dulu untuk fix bug ContainerConfig)
            echo "♻️ Restarting containers..."
            docker-compose down
            docker-compose up -d

            # 5. Tunggu database ready
            echo "⏳ Menunggu database ready..."
            for i in $(seq 1 30); do
              if docker-compose exec -T db mysqladmin ping -h localhost --silent; then
                echo "✅ Database ready."
                break
              fi
              echo "Still waiting for DB..."
              sleep 2
            done

            # 6. Jalankan migration
            echo "📂 Running migrations..."
            docker-compose exec -T app php artisan migrate --force --no-interaction

            # 7. Cache optimize
            echo "🧹 Optimizing cache..."
            docker-compose exec -T app php artisan config:cache
            docker-compose exec -T app php artisan route:cache
            docker-compose exec -T app php artisan view:cache

            echo "✅ Deployment selesai!"
