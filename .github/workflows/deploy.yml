name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # Menggunakan variabel otomatis agar lebih fleksibel
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_mysql, bcmath

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHPUnit tests
        run: php artisan test || true

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload Docker Compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8022
          source: "docker-compose.yml"
          target: "~/RPL2D-kelompok-7"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8022
          script: |
            set -e
            echo "🚀 Start deployment..."

            # Login ke GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Masuk ke folder project (pastikan folder sudah ada)
            mkdir -p ~/RPL2D-kelompok-7
            cd ~/RPL2D-kelompok-7

            # Variabel Image (lowercase agar tidak error di docker)
            export APP_IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" | tr '[:upper:]' '[:lower:]')
            export COMPOSE_PROJECT_NAME=kelompok7

            echo "📦 Pulling latest images..."
            docker-compose pull

            echo "♻️ Restarting stack..."
            # Menggunakan docker-compose (dengan tanda hubung)
            docker-compose up -d --remove-orphans

            echo "⏳ Waiting for database..."
            # Menunggu DB siap (MySQL)
            for i in $(seq 1 30); do
              if docker-compose exec -T db mysqladmin ping -h localhost --silent; then
                echo "✅ Database ready."
                break
              fi
              echo "Still waiting for DB..."
              sleep 2
            done

            echo "📂 Running migrations..."
            docker-compose exec -T app php artisan migrate --force --no-interaction

            echo "🧹 Clearing & Optimizing Cache..."
            docker-compose exec -T app php artisan config:cache
            docker-compose exec -T app php artisan route:cache
            docker-compose exec -T app php artisan view:cache

            echo "✅ Deployment finished successfully!"
