name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1: TEST ─────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_mysql, bcmath

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHPUnit tests
        run: php artisan test || true

  # ─── JOB 2: BUILD & PUSH ────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─── JOB 3: DEPLOY VPS ──────────────────────
      deploy:
        name: Deploy ke VPS
        runs-on: ubuntu-latest
        needs: build-and-push

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Upload Docker Compose
            uses: appleboy/scp-action@v0.1.7
            with:
              host: ${{ secrets.SERVER_HOST }}
              username: ${{ secrets.SERVER_USER }}
              key: ${{ secrets.SERVER_SSH_KEY }}
              port: 8022
              source: "docker-compose.yml,.env"
              target: "~/RPL2D-kelompok-7"

          - name: Deploy via SSH
            uses: appleboy/ssh-action@v1.0.3
            with:
              host: ${{ secrets.SERVER_HOST }}
              username: ${{ secrets.SERVER_USER }}
              key: ${{ secrets.SERVER_SSH_KEY }}
              port: 8022

              script: |
                set -e

                echo "🚀 Mulai deployment..."

                cd ~/RPL2D-kelompok-7

                echo "🐳 Docker version:"
                docker --version

                echo "🐳 Docker Compose version:"
                docker-compose version

                echo "🔑 Login GHCR..."
                echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

                export APP_IMAGE=$(echo "ghcr.io/${{ github.repository }}:latest" | tr '[:upper:]' '[:lower:]')

                echo "🧹 Stop old containers..."
                docker-compose down --remove-orphans || true

                echo "🧹 Remove broken containers..."
                docker rm -f kelompok7_app_1 || true
                docker rm -f kelompok7_db_1 || true

                echo "📦 Pull latest image..."
                docker-compose pull

                echo "♻️ Start containers..."
                docker-compose up -d --force-recreate

                echo "⏳ Waiting database..."

                for i in $(seq 1 30); do
                  if docker-compose exec -T db mysqladmin ping -h localhost --silent; then
                    echo "✅ Database ready"
                    break
                  fi

                  echo "Still waiting DB..."
                  sleep 2
                done

                echo "📂 Run migration..."
                docker-compose exec -T app php artisan migrate --force --no-interaction

                echo "🧹 Laravel optimize..."
                docker-compose exec -T app php artisan config:cache
                docker-compose exec -T app php artisan route:cache
                docker-compose exec -T app php artisan view:cache

                echo "✅ Deployment selesai!"
