name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_PATH: /opt/kulosehat

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_mysql, bcmath

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHPUnit tests
        run: php artisan test || true

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            mkdir -p ${{ env.DEPLOY_PATH }}
            cd ${{ env.DEPLOY_PATH }}
            APP_KEY_VALUE="${{ secrets.APP_KEY }}"
            if [ -z "$APP_KEY_VALUE" ] && [ -f .env ]; then
              APP_KEY_VALUE=$(grep '^APP_KEY=' .env | cut -d= -f2-)
            fi
            if [ -z "$APP_KEY_VALUE" ]; then
              APP_KEY_VALUE="base64:$(openssl rand -base64 32)"
            fi
            GOOGLE_CLIENT_ID_VALUE="${{ secrets.GOOGLE_CLIENT_ID }}"
            GOOGLE_CLIENT_SECRET_VALUE="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            if [ -z "$GOOGLE_CLIENT_ID_VALUE" ] && [ -f .env ]; then
              GOOGLE_CLIENT_ID_VALUE=$(grep '^GOOGLE_CLIENT_ID=' .env | cut -d= -f2-)
            fi
            if [ -z "$GOOGLE_CLIENT_SECRET_VALUE" ] && [ -f .env ]; then
              GOOGLE_CLIENT_SECRET_VALUE=$(grep '^GOOGLE_CLIENT_SECRET=' .env | cut -d= -f2-)
            fi

            cat > .env <<EOF
            APP_NAME="Kulo Sehat"
            APP_ENV=production
            APP_KEY=${APP_KEY_VALUE}
            APP_DEBUG=false
            APP_URL=https://kulosehat.site

            LOG_CHANNEL=stack
            LOG_STACK=single
            LOG_LEVEL=debug

            DB_CONNECTION=mysql
            DB_HOST=db
            DB_PORT=3306
            DB_DATABASE=kulosehat
            DB_USERNAME=kulosehat
            DB_PASSWORD=kulosehat_password
            DB_ROOT_PASSWORD=rootpasswordharusnyaunik

            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID_VALUE}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET_VALUE}
            GOOGLE_REDIRECT_URI=https://kulosehat.site/auth/google/callback

            SESSION_DRIVER=database
            SESSION_LIFETIME=120
            CACHE_STORE=database
            QUEUE_CONNECTION=database
            BROADCAST_CONNECTION=log
            FILESYSTEM_DISK=local
            EOF

      - name: Upload docker-compose.yml
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
          scp -i ~/.ssh/deploy_key -P 22 docker-compose.yml \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.yml"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 30m
          command_timeout: 60m

          script: |
            set -e

            echo "🚀 Mulai deployment..."

            cd ${{ env.DEPLOY_PATH }}

            if ! docker compose version > /dev/null 2>&1; then
              echo "Docker Compose v2 belum tersedia di VPS."
              exit 1
            fi

            echo "🐳 Docker version:"
            docker --version

            echo "🐳 Docker Compose version:"
            docker compose version

            # Login GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Lowercase image name
            export APP_IMAGE=$(echo "ghcr.io/${{ github.repository }}:latest" | tr '[:upper:]' '[:lower:]')

            echo "🧹 Cleaning broken containers..."
            docker compose down --remove-orphans || true

            docker rm -f laravel_app || true
            docker rm -f laravel_db || true

            echo "🧹 Cleaning Docker cache..."
            docker system prune -af || true

            echo "📦 Pulling latest images..."
            docker compose pull

            echo "♻️ Starting fresh containers..."
            docker compose up -d --force-recreate

            echo "⏳ Waiting for database..."

            for i in $(seq 1 30); do
              if docker compose exec -T db mysqladmin ping -h localhost --silent; then
                echo "✅ Database ready."
                break
              fi

              echo "Still waiting for DB..."
              sleep 2
            done

            echo "📂 Running migrations..."
            docker compose exec -T app php artisan migrate --force --no-interaction

            echo "🧹 Optimizing Laravel..."
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache

            echo "✅ Deployment selesai!"
